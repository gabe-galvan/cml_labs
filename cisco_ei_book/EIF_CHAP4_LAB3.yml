lab:
  description: 'Lab 3: EIGRP Stub'
  notes: |-
    #### Task 1
    Configure EIGRP AS 100 on the E0/0 interfaces of R1 and R2, respectively, as well as on all loopback interfaces of these two routers. On R1 configure EIGRP using the classic mode, and on R2 configure EIGRP in named mode to accomplish this task.
    Do not run EIGRP on the E0/1 Interface of R1 and R2.


    #### Task 2
    Configure R1 and R2 to summarize their loopback interfaces in EIGRP.


    #### Task 3
    Configure the following static routes on R1 and R2 and redistribute them into EIGRP:
    - On R1: 11.0.0.0/8 via E0/1
    - On R2: 22.0.0.0/8 via E0/1

    #### Task 4
    Advertise the E0/1 interface of R1 and R2 into RIPv2 and disable auto-summarization.
    You should redistribute RIPv2 into EIGRP and use any metric for the redistributed routes.


    #### Task 5
    Configure EIGRP stub routing on R1 by using the command eigrp stub connected.
    Test this option and verify the routes in the routing tables of both routers.


    #### Task 6
    Remove the eigrp stub connected option configured in the previous task and reconfigure EIGRP stub routing on R1 by using the eigrp stub summary command.
    Test this option and verify the routes in the routing tables of both routers.


    #### Task 7
    Remove the eigrp stub summary option configured in the previous task and reconfigure EIGRP stub routing on R1 by using the command eigrp stub static.
    Test this option and verify the routes in the routing tables of both routers.


    #### Task 8
    Remove the eigrp stub static option configured in the previous task and reconfigure EIGRP stub routing on R1 by using the command eigrp stub redistributed.
    Test this option and verify the routes in the routing tables of both routers.


    #### Task 9
    Remove the eigrp stub redistributed option configured in the previous task and reconfigure EIGRP stub routing on R1 by using the command eigrp stub receive-only.
    Test this option and verify the routes in the routing tables of both routers.

    #### Task 10
    Remove the eigrp stub receive-only option configured in the previous task and reconfigure EIGRP stub routing on R1 by using the command eigrp stub.
    Test this option and verify the routes in the routing tables of both routers.


    #### Task 11
    Erase the startup configuration and reload the routers before proceeding to the next lab.
  title: EIF_CHAP4_LAB3
  version: 0.3.0
