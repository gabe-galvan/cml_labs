lab:
  description: 'Lab 6: EIGRP Authentication'
  notes: |-
    #### Task 1
    Configure EIGRP based on the previous diagram. If this configuration is successful, these routers should be able to see and have reachability to all routes.
    You should use named mode configuration style when configuring R2 and R3 and classic EIGRP configuration style when configuring R1 to accomplish this task.


    #### Task 2
    Configure R2 to authenticate all existing and future directly connected interfaces using the strongest authentication method available.
    Use the minimum number of commands and CCIE as the password to accomplish this task.
    - R2 should authenticate R1 using MD5 and Cisco as the password.
    - In the future, R3 may have other neighbors that won’t need authentication.


    #### Task 3
    Erase the startup configuration and reload the routers before proceeding to the next lab.
  title: EIF_CHAP4_LAB6
  version: 0.3.0
