          ! IOSvL2 Config generated on 2025-09-10 02:14
          ! by ank-ng
          !
          version 15.2
          service timestamps debug datetime msec
          service timestamps log datetime msec
          no service password-encryption
          service compress-config
          no service config
          enable password cisco
          no ip domain lookup
          !
          line vty 0 4
          transport input ssh telnet
          exec-timeout 720 0
          password cisco
          login
          !
          line con 0
          password cisco
          !
          hostname sw-3
          !
          boot-start-marker
          boot-end-marker
          !
          !
          no aaa new-model
          !
          vtp domain virl.lab
          vtp mode transparent
          !
          vlan 2
            name ank_vlan2
          !
          !
          no cdp run
          !
          !
          ip cef
          no ipv6 cef
          !
          spanning-tree mode pvst
          spanning-tree extend system-id
          !
          vlan internal allocation policy ascending
          !
          !
          vrf definition Mgmt-intf
          !
           address-family ipv4
           exit-address-family
           !
           address-family ipv6
           exit-address-family
          !
          !
          interface Loopback0
              description not connected
              shutdown
          interface GigabitEthernet0/0
              description not connected
              shutdown
          interface GigabitEthernet0/1
              description to GigabitEthernet0/1.SW-1
              no shutdown
          interface GigabitEthernet0/2
              description to GigabitEthernet0/1.SW-2
              no shutdown
          interface GigabitEthernet0/3
              description not connected
              shutdown
          !
          !
          ip forward-protocol nd
          !
          no ip http server
          no ip http secure-server
          !
          !
          control-plane
          !
          end
