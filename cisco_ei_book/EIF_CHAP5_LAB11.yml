lab:
  description: 'Lab 11: OSPF Authentication'
  notes: |-
    #### Task 1
    Configure the directly connected interfaces of all routers in Area 0.
    The router IDs of the routers in this area should be configured as 0.0.0.x, where x is the router number.


    #### Task 2
    Configure plaintext authentication on all the links connecting the routers in this area.
    You must use a router configuration command as part of the solution in resolving this task.
    Use aaa as the password for this authentication.


    #### Task 3
    Remove the authentication configuration from the previous task and ensure that every router sees every route advertised in Area 0.

    #### Task 4
    Configure MD5 authentication on all the links in Area 0. You should use a router configuration command as part of the solution to this task.
    Use ccc as the password for this authentication.


    #### Task 5
    Remove the authentication configuration from the previous task and ensure that every router sees every route advertised in Area 0.


    #### Task 6
    Configure MD5 authentication on the link connecting R1 to R2.
    You should use a router configuration command as part of the solution to this task.
    The password should be ccie.


    #### Task 7
    Reconfigure the authentication password on R1 and R2 to be CCIE12, without interrupting the link’s operation.
    Do not remove any commands to accomplish this task.


    #### Task 8
    Configure MD5 authentication on the link that connects R4 to R5, using Cisco45 as the password.
    You should not use a router configuration mode to accomplish this task.

    #### Task 9
    Reconfigure OSPF areas based on the following chart:
    | Router | Interface | Area |
    | :---: | :---: | :---: |
    | ---------- | ---------- | ---------- |
    | R1 | E0/0 | 0
    | | Lo0 | 0
    | ---------- | ---------- | ---------- |
    | R2 | E0/0 | 0 |
    | | E0/1 | 1 |
    | | Lo0 | 1 |
    | ---------- | ---------- | ---------- |
    | R3 | E0/1 | 1 |
    | | E0/0 | 2 |
    | | Lo0 | 2 |
    | ---------- | ---------- | ---------- |
    | R4 | E0/0 | 2 |
    | | E0/1 | 3 |
    | | Lo0 | 3 |
    | ---------- | ---------- | ---------- |
    | R5 | E0/1 | 3 |
    | | Lo0 | 3 |
    | ---------- | ---------- | ---------- |


    #### Task 10
    Configure MD5 authentication on the link between R1 and R2 in Area 0.
    The password for this authentication should be set to Micronics.
    You should use router configuration
    mode to accomplish this task.


    #### Task 11
    Configure the strongest authentication between R4 and R5.
    Configure the password to be PSWD.
  title: EIF_CHAP5_LAB11
  version: 0.3.0
