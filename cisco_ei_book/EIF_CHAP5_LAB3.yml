lab:
  description: 'Lab 3: OSPF Non-Broadcast Networks'
  notes: |-
    #### Task 1
    Configure OSPF Area 0 on all routers and their directly connected interfaces.
    You should configure the tunnel interfaces as the OSPF non-broadcast network type.
    Configure the OSPF router IDs to be 0.0.0.x, where x is the router number.
  title: EIF_CHAP5_LAB3
  version: 0.3.0
