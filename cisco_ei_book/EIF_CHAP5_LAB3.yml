          ip route 192.1.2.2 255.255.255.255 192.1.3.10
          ip route 192.1.4.4 255.255.255.255 192.1.3.10
          !
          !
          int tunnel 1234
          ip addr 10.1.1.3 255.255.255.0
          tunnel source e0/0
          tunnel mode gre multipoint
          ip nhrp network-id 333
          ip nhrp map 10.1.1.1 192.1.1.1
