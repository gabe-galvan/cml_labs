      - name: ios_config.txt
        content: |-
          hostname R3
          !
          interface range Ethernet 0/0 - 3
          no shut
          !
          vrf def ext_mgmt
          rd 900:900
          address-family ipv4
          exit
          !
          username cisco priv 15 password 0 cisco
          !
          ip domain name lab.cml
          !
          cry key gen rsa mod 2048
          !
          !
          interface e0/3
          des External SSH Bridge DO NOT MODIFY
          vrf forwarding ext_mgmt
          no shut
          !
