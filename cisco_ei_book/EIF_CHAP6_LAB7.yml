lab:
  description: 'Lab 7: BGP Filtering'
  notes: |-
    #### Task 1
    Establish a BGP peering session on the devices based on the diagram.
    The BGP sessions must be established based on the Loopback0 interfaces of the devices.
    These devices should advertise their Lo200 interface in BGP.


    #### Task 2
    Configure R2 such that AS 300 and AS 600 do not use AS 200 as a transit AS.


    #### Task 3
    Configure SW4 such that it filters any prefix(es) that has originated or traversed AS 200.
    Do not use a route map to accomplish this task.


    #### Task 4
    Configure SW5 to filter any prefix(es) that has originated in AS 400.


    #### Task 5
    Configure R5 to filter paths that have AS 800 as the second AS in the AS-Path.

    #### Task 6
    Configure R8 in AS 800 to only allow prefixes from existing and future autonomous systems that are directly connected.


    #### Task 7
    Configure SW1 to filter any prefix(es) that originated in AS 200 and traversed through AS 300.


    #### Task 8
    Configure R7 to prepend its AS number four additional times when it advertises its Loopback200 interface to its directly connected neighbors.


    #### Task 9
    Configure R4 to filter any prefix(es) that has prepended the AS number multiple times.


    #### Task 10
    Configure R6 to filter all prefixes that were received by and originated in AS 200.


    #### Task 11
    Configure SW4 to filter the prefixes that originated from AS 933’s directly connected neighbors.
    This should not override the previous policy implemented in Task 4.


    #### Task 12
    Configure R7 such that it discards paths for any prefix(es) that has more than two AS hops.


    #### Task 13
    Configure R3 to advertise network 30.3.3.0/24. This network is a static route to Null0 that was part of the initial configuration file.

    #### Task 14
    Ensure that R1 is configured such that if the number of routes received from R3 exceeds 10,
    it shuts down the neighbor (R3).
    R1 should generate a console warning message when 80% of this threshold is reached.
    If the adjacency goes down because of this policy, R1 should restart the adjacency after 1 minute and check the number of routes; if they still exceed the threshold, the adjacency should once again go down, and the cycle should repeat.


    #### Task 15
    Configure SW4 to advertise networks 40.0.0.0/8 through 49.0.0.0/8, which were preconfigured in SW4’s routing table as static routes pointing to Null0.
  title: EIF_CHAP6_LAB7
  version: 0.3.0
