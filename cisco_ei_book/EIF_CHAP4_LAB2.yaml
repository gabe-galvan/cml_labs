lab:
  description: ''
  notes: |-
    #### Task 1
    Configure the routers based on the previous diagram. Do not configure any routing
    protocol.


    #### Task 2
    Configure EIGRP AS 100 on all directly connected interfaces of these two routers and
    ensure reachability.
    R5 should be configured using EIGRP classical mode, and R6 should
    use the EIGRP named mode configuration style.


    #### Task 3
    Configure and test BFD on these two routers.


    #### Task 4
    Erase the startup configuration of these two routers and reload the devices before proceeding
    to the next lab.
    From
  title: EIF_CHAP4_LAB2
  version: 0.3.0
