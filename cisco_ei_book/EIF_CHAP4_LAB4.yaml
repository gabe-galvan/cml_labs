lab:
  description: 'Lab 4: EIGRP Filtering'
  notes: |-
    #### Task 1
    Configure EIGRP 100 on all routers and advertise their directly connected links into EIGRP.


    #### Task 2
    Configure R4 such that it filters existing (1.0.0.0/8, 11.0.0.0/8, and 111.0.0.0/8) and future networks behind R1.
    Do not use distribute-list, access-list, prefix-list, or route-map to accomplish this task.


    #### Task 3
    Configure R4 such that it uses R2 as its only connection to network 200.1.1.0 /24.
    You should use an access list to accomplish this task.


    #### Task 4
    Configure R4 such that it takes R3 to reach network 200.2.2.0 /24.
    R4 should only use R2 as the next hop to reach network 200.2.2.0/24 when R3 is down.
    You should use a standard access list to accomplish this task.


    #### Task 5
    Filter network 2.0.0.0/8 on R4.
    Do not use distribute-list or route-map to accomplish this task.


    #### Task 6
    Configure R4 to filter network 3.0.0.0/8.


    #### Task 7
    Erase the startup configuration and reload the routers before proceeding to the next task.
  title: EIF_CHAP4_LAB4
  version: 0.3.0
