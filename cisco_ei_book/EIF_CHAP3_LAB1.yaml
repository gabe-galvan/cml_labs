lab:
  description: 'Lab 1: Configuring RIPv2'
  notes: |-
    #### Task 1

    Configure RIPv2 on all routers and switches. Advertise their directly connected interfaces in this routing domain.
    These devices should not have a classful nature.

    If this configuration is successful, the routers and switches should successfully exchange routes.
    Use the following policy when configuring this task:
    1. R7 and R1 must use two static routes for reachability.
    2. R1 and R4 must not use a static route(s). R1 cannot use any solution that’s used
    in the previous policy or the next ones to provide reachability. You are allowed to
    disable the sanity check.
    3. You cannot use PBR to resolve any of the policies in this task.
    4. The IP addresses configured on all the devices in the topology are correct.

    #### Task 2

    - Configure R4 such that it sends RIPv2 updates out of its Lo0 interface to a broad-
    cast destination.
      - Do not change RIP’s version.
    - Ensure that R1 is configured to send unicast updates to its neighboring router R7.

    #### Task 3

    Configure the following loopback interfaces on R3. Starting with network 30.3.0.0/24,
    this router should only advertise every other third octet network (for example, x.x.0.x,
    x.x.2.x, x.x.4.x).
    These are networks 30.3.0.0, 30.3.2.0, 30.3.4.0, 30.3.6.0, 30.3.8.0, and
    30.3.10.0/24.
    |  Interface |  IP |
    | :---: | :---: |
    | lo0 | 30.3.0.1 /24 |
    | lo1 | 30.3.1.1 /24 |
    | lo2 | 30.3.2.1 /24 |
    | lo3 | 30.3.3.1 /24 |
