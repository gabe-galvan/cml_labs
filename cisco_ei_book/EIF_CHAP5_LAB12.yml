lab:
  description: 'Lab 12: OSPF Best-Path Determination'
  notes: |-
    #### Task 1
    Configure OSPF on the routers in the previous topology based on the following policy:
    - Configure OSPF Area 0 on the link connecting R1 to R2.
      - R2 should run OSPF Area 0 on all of its directly connected interfaces.
      - R1 should use OSPF PID 12, and R2 should use OSPF PID 1.
    - Configure OSPF Area 0 on the link connecting R1 to R3.
      - R3 should run OSPF Area 0 on all of its directly connected interfaces.
      - R1 should use OSPF PID 13, and R3 should use OSPF PID 1.
    - Configure OSPF Area 0 on the link connecting R1 to R4.
      - R4 should run OSPF Area 0 on its G0/1 interface and Area 4 on its Loopback0 interface.
    - Configure OSPF Area 0 on the link connecting R1 to R5.
      - R5 should redistribute its Loopback0 interface as external Type 2 in this routing domain.
    - Configure OSPF Area 0 on the link connecting R1 to R6.
      - R6 should redistribute its Loopback0 interface as external Type 1 in this routing domain.
    - Configure OSPF Area 7 on the link connecting R1 to R7.
      - Area 7 should be configured as an NSSA.
      - R7 should redistribute its Loopback0 interface as external Type 2 in this routing domain.
    - Configure OSPF Area 8 on the link connecting R1 to R8.
      - Area 8 should be configured as an NSSA.
      - R8 should redistribute its Loopback0 interface as external Type 1 in this routing domain.


    #### Task 2
    Walk through OSPF best-path determination.
  title: EIF_CHAP5_LAB12
  version: 0.3.0
