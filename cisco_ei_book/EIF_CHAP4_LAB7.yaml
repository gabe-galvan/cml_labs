lab:
  description: 'Lab 7: EIGRP Challenge Lab'
  notes: |-
    #### Ticket 1
    R1 can’t reach R3’s Lo0. You must configure R1 to fix the problem.


    #### Ticket 2
    R6 does not have a stable EIGRP adjacency with R4. Do not use an EIGRP command to
    fix this ticket.


    #### Ticket 3
    When R3’s E0/3, E0/1, and E0/0 are down, R3 can’t reach R4’s Lo0.
    Do not remove any commands to fix this ticket.


    #### Ticket 4
    R1’s Lo0 should always have reachability to R4’s Lo0 and G0/5 interfaces, but it does not.
    You should fix this problem without configuring R1 or R4.
    You should not remove any commands to resolve this ticket.


    #### Ticket 5
    R3 is configured to use multiple paths to R4’s Lo0. However, it’s using only one of the paths.


    #### Ticket 6
    R6 can’t reach R7’s Lo101.


    #### Ticket 7
    R3 should establish a EIGRP adjacency with R8 over its G0/8 interface.
    You should make configuration changes on R3 only.


    #### Ticket 8
    Erase the startup configuration and reload the devices before proceeding to the next lab.
  title: EIF_CHAP4_LAB7
  version: 0.3.0
