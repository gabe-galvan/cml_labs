lab:
  description: 'Lab 7: OSPF Filtering'
  notes: |-
    Pre-configuration:
    - OSPF is configured on all routers, and all loopback interfaces are configured with
    their correct masks.
    - OSPF router IDs are configured as 0.0.0.x, where x is the router number.


    #### Task 1
    Configure R1 and R3 such that the link connecting them to each other is not advertised into OSPF.
    R1 and R3 should still maintain their OSPF adjacency through this interface.

    #### Task 2
    Configure R5 such that it only advertises its Lo0 and Lo1 interface addresses into OSPF.
    Do not remove or modify the network command/s configured in the router configuration
    mode.
    You should use two different solutions: one for the Lo0 interface and a second one for the Lo1 interface.


    #### Task 3
    Configure R3 to redistribute all OSPF prefixes into BGP AS 100. R8 should redistribute its Lo88 into OSPF interfaces such that R7 filters network 88.0.0.0 /8 from getting into its BGP table.


    #### Task 4
    Configure LSA Type 3 filtering on R3 to filter network 1.1.1.0 /24 from the rest of the OSPF domain.
    You should reference Area 1 when accomplishing this task.


    #### Task 5
    Configure LSA Type 3 filtering on R8 to filter network 5.5.5.0 /24 from getting into Area 2.


    #### Task 6
    Configure LSA Type 3 filtering on R8 to filter network 50.5.5.0 /24.
    You should reference Area 0 when accomplishing this task.


    #### Task 7
    Configure R8 such that network 100.1.1.0 /24 is not advertised to the routers in Area 2.
    Do not use the following to accomplish this task:
    - A distribute list, an area filter list, distance, a route map, an access list, or a prefix list


    #### Task 8
    Configure R3 such that network 111.1.1.0 /24 is not advertised to routers in Area 0 or Area 2.
    Do not add any static routes, use a filter list, or use a distribute list to accomplish this task.


    #### Task 9
    Enable OSPF Area 2 on the G0/9 interfaces of R2, R4, and R6.


    #### Task 10
    Configure R2, R4, and R6 based on the following policy:
    - R2 should redistribute networks 120.2.2.0 /24 and 122.2.2.0 /24 as OSPF external Type 1 networks.
    - R2 should redistribute its Lo0 and Lo1 interfaces into the OSPF routing domain.
    - R4 should redistribute networks 140.4.4.0 /24 and 144.4.4.0 /24 as OSPF external Type 1 networks.
    - R4 should redistribute its Lo0 and Lo1 interfaces into the OSPF routing domain.


    #### Task 11
    Configure R2 and R6 to redistribute their Lo0 interfaces. Configure the appropriate routers such that the routers in Area 2 can see networks 2.2.2.0 /24, 4.4.4.0 /24, and 6.6.6.0 /24 in their routing tables.
    The routers in the other areas, however, should not have these networks in their routing table.


    #### Task 12
