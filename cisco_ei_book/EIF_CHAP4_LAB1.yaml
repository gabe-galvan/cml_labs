lab:
  description: 'Lab 1: EIGRP Named Mode'
  notes: |-
    #### Task 1
    Configure EIGRP on R1, R2, and R3 based on the following policy:
    |  Router  |  Interface  |  AS  |
    | :----- | :-----: | -----: |
    | R1 | E1/0 | 200 |
    | | E0/0 | 100 |
    | | E0/2 | 100 |
    | | E0/1 | 100 |
    | | Loopback0 - 3 | 100 |
    | ------ | ------ | ------ |
    | R2 | E1/0 | 200
    | | E0/2| 100
    | | E0/0 | 100
    | | Loopback0 | 100
    | ------ | ------ | ------ |
    | R3 | E0/0 | 100 |
    | | E0/1 | 100 |
    | | Loopback0 | 100 |

    #### Task 2
    Configure R4 and R5 in EIGRP AS 100. You must use named mode to accomplish this task.


    #### Task 3
    Configure R1, R4, and R5 to use unicast to establish their EIGRP neighbor adjacency.


    #### Task 4
    Configure R6 in EIGRP AS 200. This router should run EIGRP AS 200 on its G0/9 and
    Loopback0 interfaces. You should use an EIGRP named mode configuration to accomplish
    this task.


    #### Task 5
    Configure OSPF Area 0 on R6’s G0/9 and R7’s G0/9 and Loopback0 interfaces.
    The router ID of these routers should be configured as 0.0.0.x, where x is the router number.


    #### Task 6
    Configure R6 to redistribute OSPF into EIGRP such that R1 and R2 go directly to R7 to
    reach the 7.0.0.0/8 network.


    #### Task 7
    Configure the hello interval of all routers in AS 200 to be twice the default hello interval.


    #### Task 8
    Configure R4 such that in the worst-case scenario, it uses 10% of the bandwidth for its
    EIGRP updates. This policy should apply to the existing and future interfaces.


    #### Task 9
    Configure R1 to summarize its loopback interfaces and advertise a single summary in the
    EIGRP AS 100 routing domain.


    #### Task 10
    Configure R1 to limit the number of received prefixes from R5 to 10.
     R1 should be configured to receive a warning message once 50% of this threshold is reached and a warning
    message for every additional route that exceeds the threshold.
    You should configure Lo1–Lo10 on R5 by copying and pasting the initial configuration, called EIGRP-Lab-1-Task10.

    #### Task 11
    Configure R1 to limit the number of prefixes received from R4 to five.
    R1 should be configured
    to tear down the adjacency if R4 exceeds the specified threshold. Copy and paste
    the EIGRP-Lab-1-Task11 initial configuration on R4.
  title: EIF_CHAP4_LAB1
  version: 0.3.0
