lab:
  description: 'Lab 5: OSPF Point-to-Multipoint and Point-to-Multipoint Non-broadcast
    Networks'
  notes: |
    #### Task 1
    Configure OSPF Area 0 on all links in the previous topology.
    The OSPF router IDs of all routers should be 0.0.0.x, where x is the router number.
    The tunnel interface of these routers should not perform DR/BDR election.

    If this configuration is performed successfully, the routers in this topology should have full NLRI to every network in this topology.


    #### Task 2
    Since R2’s connection to the cloud is 10 Mbps and R3’s connection is 100 Mbps, R1 should not perform equal-cost load sharing.
    R1 should go through R3 to reach network 23.1.1.0/24.
    **Do not configure PBR or the IP ospf cost command to accomplish this task.**
  title: EIF_CHAP5_LAB5
  version: 0.3.0
