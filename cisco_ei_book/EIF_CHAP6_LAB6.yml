lab:
  description: 'Lab 6: BGP Aggregation'
  notes: |-
    #### Task 1
    R3 is configured in AS 300, and R4 is configured in AS 400.
    Configure R3 and R4 to advertise their loopback interfaces in BGP.
    If this configuration is done successfully, R2 in AS 200 should see four prefixes in its BGP table.
    You should use network statements to accomplish this task.


    #### Task 2
    Configure R2 to aggregate all four prefixes received from AS 300 and AS 400.
    Ensure that R2 can advertise the aggregate route to existing and future neighbor(s).
    Configure a BGP peering session between R2 and R1.
    If this configuration is performed successfully, R1 in AS 100 should only receive a single prefix representing the four prefixes.


    #### Task 3
    Configure R2 such that R1 in AS 100 can see the AS numbers where some or all the
    specific prefixes originated.
    Do not directly attach a route map to a neighbor or prefix in order to accomplish this.


    #### Task 4
    Configure R2 such that only R1 in AS 100 and R4 in AS 400 accept the aggregate.
    The other AS(es) in this topology (such as AS 300) should receive the aggregate route, but they should discard it.


    #### Task 5
    Configure R2 to advertise the aggregate plus 10.1.2.0/24 prefix to R1 and R4.


    #### Task 6
    Configure R2 to advertise 10.1.3.0/24 to R1 only.
    R4 should not receive this prefix
  title: EIF_CHAP6_LAB6
  version: 0.3.0
