lab:
  description: 'Lab 13: OSPF Challenge'
  notes: |-
    **- The DMVPN should not be changed to dynamic.**
    **- You should only fix the problem that is specified in the ticket.**

    #### Ticket 1
    R5 can’t ping R3’s Lo0 interface.


    #### Ticket 2
    R2 can’t reach R5’s Lo0 interface.
    There should be a DR.
    Do not use neighbor command when fixing this problem.

    #### Ticket 3
    R1 can’t ping R5’s Lo0 interface.
    You must use an OSPF command to fix this problem.


    #### Ticket 4
    R4 is configured to filter R3’s Lo0 interface from reaching R6.
    R6 should have reachability to all loopback interfaces in this topology except R3’s Lo0 interface.
    However, this is not the case. R6 should not get any error messages regarding tunnel interfaces.
    Use two other commands to fix other problems on R6.
    R6 should not have 6.14.0.3/32 in its routing table after you fix the other problems.


    #### Ticket 5
    R5 is configured to inject a default route if R3’s Lo0 interface is reachable.
    However, R5 is not injecting a default route.
    You can remove and reconfigure a command on the appropriate router once, but you must use the same method.


    #### Ticket 6
    R2 is configured to summarize R1’s loopback interfaces (Lo100–Lo103).
    However, R5 can see all the specific routes of the summary in its routing table.
    Do not remove any commands to accomplish this task.


    #### Ticket 7
    R3 is participating in another OSPF routing domain, using the process ID 378.
    R3 has two neighboring routers, R7 and R8.
    R7 and R8 are both summarizing their identical specific routes.
    R3 should use R7 and not R8 to reach the summary route.
    If router R7 is down, then R3 should go through R8 to reach the summary.
    Do not use the following on any router to accomplish this task:
    - Cost
    - Bandwidth
    - Static routes
    - PBR
    - Any kind of tunneling
    - Running extra routing process
