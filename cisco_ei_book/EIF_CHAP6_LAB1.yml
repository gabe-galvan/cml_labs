lab:
  description: |-
    Lab 1: Establishing a BGP Session Using the Correct
    TTL Value
  notes: |-
    #### Task 1
    Configure appropriate IP addressing as indicated in the diagram above.


    #### Task 2
    Configure R1 and R2 to become eBGP neighbors.
    They should use their Loopback0 interfaces as the peering addresses.


    #### Task 3
    Reconfigure the above BGP peering such that R1 and R2 are able to become eBGP peers without using the disable-connected-check command.
    Ensure that the TTL value of sent packets is as low as possible.
    Use a BGP-related command to accomplish this task.


    #### Task 4
    Reconfigure R1 and R2 such that they form an eBGP peering with each other.
    Ensure that the TTL value of any received BGP packet is no less than 253.
    Do not use the disable connected-check command.


    #### Task 5
    Configure R1 and R2 to become eBGP peers.
    Do not use disable-connected-check, ebgp-multihop, or ttl-security to accomplish this task.
    Do not configure any tunneling mechanisms or IRB to accomplish this task.
  title: EIF_CHAP6_LAB1
  version: 0.3.0
