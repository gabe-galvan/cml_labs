lab:
  description: 'Lab 3: Route Reflectors'
  notes: |-
    ### Task 1
    Configure BGP AS 100 on all routers and ensure that the routers can successfully establish an iBGP peering session with each other.
    These routers should only advertise their Loopback0 interface in BGP.


    ### Task 2
    Management emails you, stating that within the next 12 months, 20 additional routers
    will be added to this AS.
    In order to minimize the number of peering sessions within this AS, you decide to implement route reflectors.
    Configure R1 as a route reflector for this AS.

    #### Task 3
    After implementing the route reflector, you realize that if the route reflector is down, the entire network is dysfunctional; therefore, you decide to add R4 as the second route reflector for redundancy.
    Ensure that the routers can reach the advertised networks and the redundancy is operational.
    R4 should advertise its Lo0 interface in BGP.
  title: EIF_CHAP6_LAB3_T1-3
  version: 0.3.0
