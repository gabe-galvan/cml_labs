lab:
  description: 'Lab 5: Advanced EIGRP Lab'
  notes: |-
    #### Task 1
    Configure the E0/0 interfaces of R1, R2, and R3 in EIGRP AS 100.
    These routers should be configured to advertise their Lo0 interfaces in this AS, using the following policy:
    - These routers should be configured to reach each other’s loopback interface(s) by
    going through R1.
    - Do not use Policy-based Routing (PBR) or configure another AS to accomplish this
    task.


    #### Task 2
    Configure R3’s E0/1, E0/2, and E0/3 in AS 300.
    Configure R4’s, R5’s, and R6’s E0/0 and loopback 0 interfaces in this AS.
    Configure R3 to summarize its Lo100–Lo107.
    The summary route should be advertised to R4, R5, and R6 based on the following
    policy:
    - R4 should receive the summary only.
    - R5 should receive the summary plus network 100.1.3.0 /24.
    - R6 should receive the summary plus all the specific routes.
    - Configure the minimum number of ip summary-address commands possible to
    accomplish this task.


    #### Task 3
    Configure EIGRP 300 on R4’s Lo134 and Lo135 and advertise a single summary in AS 300.


    #### Task 4
    Configure the E0/1 and Lo0 interfaces of R6 and the E0/1 and loopback 0 interfaces on R7 for EIGRP in AS 67.
    R7 should be configured to advertise its Lo130, such that the command **show ip route eigrp 67** on R6 produces the following output:
    D EX 130.3.0.0/16 [170/130816] via 67.1.1.7, 00:00:16, Ethernet0/0
  title: EIF_CHAP4_LAB5
  version: 0.3.0
