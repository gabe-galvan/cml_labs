lab:
  description: 'Lab 9: Virtual Links and GRE Tunnels'
  notes: |-
    #### Task 1
    Configure the routers in the previous diagram based on the following chart.
    The loopback interfaces should be advertised with their correct masks.
    You may not see all the networks in every router.
    | Router | Router ID | Interface | Area |
    | :---: | :---: | :---: | :---: |
    | ---------- | ---------- | ---------- | ---------- |
    | R1 | 0.0.0.1 | Lo0 | Area 1 |
    | | | Lo1 | Area 3 |
    | | | E0/0 | Area 1 |
    | ---------- | ---------- | ---------- | ---------- |
    | R2 | 0.0.0.2 | Lo0 | Area 0 |
    | | | Lo1 | Area 1 |
    | | | E0/0 | Area 1 |
    | | | E0/1 | Area 0 |
    | ---------- | ---------- | ---------- | ---------- |
    | R3 | 0.0.0.3 | Lo0 | Area 0 |
    | | | Lo1 | Area 2 |
    | | | E0/1 | Area 0
    | | | E0/0 | Area 2
    | ---------- | ---------- | ---------- | ---------- |
    | R4 | 0.0.0.4 | Lo0 | Area 2 |
    | | | Lo1 | Area 4 |
    | | | E0/0 | Area 2 |
    | | | E0/1 | Area 4 |
    | ---------- | ---------- | ---------- | ---------- |
    | R5 | 0.0.0.5 | Lo0 | Area 4 |
    | | | E0/1 | Area 4 |

    #### Task 2
    Ensure that the networks advertised in Area 3 are reachable by the other routers.
    Do not use a GRE tunnel to accomplish this task.


    #### Task 3
    Ensure that the networks in Area 4 are reachable by the other routers.
    You should use a GRE tunnel to accomplish this task.
    The IP address of the tunnel should be based on the Lo1 interfaces of R3 and R4.
    **Do not reconfigure the Loopback1 interfaces of these two routers.**
  title: EIF_CHAP5_LAB9
  version: 0.3.0
