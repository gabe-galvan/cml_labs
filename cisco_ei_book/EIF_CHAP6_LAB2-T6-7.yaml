lab:
  description: 'Lab 2: Establishing Neighbor Adjacency Using Different Methods'
  notes: |-
    #### Task 6
    Configure the routers based on the following policy:
    - Ensure that R1 in AS 100 establishes an eBGP peering session with R2 in AS 200.
    - Ensure that R1 advertises all of its loopback interfaces in AS 100.
    - Ensure that R2, R3, and R4 are configured in AS 200.
      - Ensure that these routers establish iBGP peering sessions in a full mesh manner and advertise their Loopback0 interfaces in AS 200.
    - Configure the BGP router IDs of the routers as follows:
      - R1: 10.1.1.1
      - R2: 10.2.2.2
      - R3: 10.3.3.3
      - R4: 10.4.4.4
    - Ensure that the loopback interfaces on R4 and R3 have reachability to the networks advertised by R1.

    #### Task 7
    Configure R2 to provide reachability to R3 and R4 by changing the next hop IP address for all the networks advertised by R1 to the IP address of its G0/0 interface.
    Use a template so that future policies can be implemented once in that template and make sure it affects R3 and R4.
    **Do not use peer groups to accomplish this task.**
  title: EIF_CHAP6_LAB2-T6-7
  version: 0.3.0
