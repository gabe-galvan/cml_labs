          tunnel source g0/0
          tunnel mode gre multipoint
          !
          ipv6 nhrp network-id 111
          !
          ipv6 nhrp map fe80::2/128 192.1.2.2
          ipv6 nhrp map fe80::3/128 192.1.3.3
          ipv6 nhrp map fe80::4/128 192.1.4.4
