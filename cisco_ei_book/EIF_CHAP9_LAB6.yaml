      - name: ios_config.txt
        content: |-
          hostname R1
          !
          ipv6 unicast-routing
          !
          interface range Ethernet 0/0 - 3
          no shut
          !
          vrf def ext_mgmt
          rd 900:900
          address-family ipv4
          exit
          !
          username cisco priv 15 password 0 cisco
